services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POTAGER_DB_PATH: ${POTAGER_DB_PATH:-/data/potager.db}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/predictions.db}
      SQLITE_PATH: ${SQLITE_PATH:-/data/predictions.db}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      OPEN_METEO_BASE_URL: ${OPEN_METEO_BASE_URL:-https://api.open-meteo.com/v1/forecast}
      DEFAULT_LOCATION: ${DEFAULT_LOCATION:-Rennes}
      DEFAULT_LATITUDE: ${DEFAULT_LATITUDE:-48.1173}
      DEFAULT_LONGITUDE: ${DEFAULT_LONGITUDE:--1.6778}
      MODEL_PATH: ${MODEL_PATH:-/app/models/xgboost_tomate.joblib}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - backend_data:/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8000}
    command: npm run dev -- --hostname 0.0.0.0
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
  frontend_node_modules:
  frontend_next:
