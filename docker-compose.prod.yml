name: potager-ehpad-prod

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: production
      LOG_LEVEL: info
      POTAGER_DB_PATH: /data/potager.db
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      OPEN_METEO_BASE_URL: https://api.open-meteo.com/v1/forecast
      DEFAULT_LOCATION: ${DEFAULT_LOCATION:-Rennes}
      DEFAULT_LATITUDE: ${DEFAULT_LATITUDE:-48.1173}
      DEFAULT_LONGITUDE: ${DEFAULT_LONGITUDE:--1.6778}
      MODEL_PATH: /app/models/xgboost_tomate.joblib
    volumes:
      - backend_data:/data
    ports:
      - "8000:8000"
    networks:
      - potager_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - potager_net
    restart: unless-stopped

networks:
  potager_net:
    driver: bridge

volumes:
  backend_data:
