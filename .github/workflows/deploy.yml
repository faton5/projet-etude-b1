name: CI/CD — Potager EHPAD

on:
  push:
    branches: [main]
  workflow_dispatch:

# Nécessaire pour OIDC (Workload Identity Federation)
permissions:
  id-token: write
  contents: read

env:
  ACR_LOGIN_SERVER: potagerehpadacr.azurecr.io
  RESOURCE_GROUP: rg-potager-ehpad
  CONTAINERAPP_ENV: env-potager-ehpad

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Tests ───────────────────────────────────────────────────────────────
  test:
    name: Tests backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Installer les dépendances
        run: pip install -r backend/requirements-dev.txt

      - name: Lancer les tests
        working-directory: backend
        env:
          PYTHONPATH: .
        run: python -m pytest tests/ -v

  # ── 2. Build & Deploy ─────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy Azure
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      # Authentification Azure via OIDC (aucun secret de mot de passe Azure)
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Installer l'extension Container Apps
        run: az extension add --name containerapp --upgrade --yes

      # Authentification Docker → ACR (admin credentials)
      - name: Login ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend : build + push ────────────────────────────────────────────
      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/potager-backend:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/potager-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ── Backend : déploiement (create ou update) ──────────────────────────
      - name: Deploy backend
        run: |
          RG="${{ env.RESOURCE_GROUP }}"
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/potager-backend:${{ github.sha }}"
          APP="potager-backend"

          if az containerapp show --name $APP --resource-group $RG &>/dev/null; then
            echo "::notice::Mise à jour de $APP..."
            az containerapp update \
              --name $APP \
              --resource-group $RG \
              --image $IMAGE
          else
            echo "::notice::Premier déploiement de $APP..."
            az containerapp create \
              --name $APP \
              --resource-group $RG \
              --environment ${{ env.CONTAINERAPP_ENV }} \
              --image $IMAGE \
              --registry-server ${{ env.ACR_LOGIN_SERVER }} \
              --registry-username ${{ secrets.ACR_USERNAME }} \
              --registry-password ${{ secrets.ACR_PASSWORD }} \
              --target-port 8000 \
              --ingress external \
              --min-replicas 0 \
              --max-replicas 1 \
              --cpu 0.5 \
              --memory 1.0Gi \
              --env-vars \
                APP_ENV=production \
                POTAGER_DB_PATH=/data/potager.db \
                MODEL_PATH=/app/models/xgboost_tomate.joblib \
                CORS_ORIGINS=http://localhost:3000
          fi

      - name: Récupérer l'URL backend
        id: backend
        run: |
          FQDN=$(az containerapp show \
            --name potager-backend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv)
          echo "fqdn=$FQDN" >> $GITHUB_OUTPUT

      # ── Frontend : build + push (NEXT_PUBLIC_API_URL injecté) ────────────
      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ steps.backend.outputs.fqdn }}
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/potager-frontend:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/potager-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # ── Frontend : déploiement (create ou update) ─────────────────────────
      - name: Deploy frontend
        run: |
          RG="${{ env.RESOURCE_GROUP }}"
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/potager-frontend:${{ github.sha }}"
          APP="potager-frontend"
          BACKEND_URL="https://${{ steps.backend.outputs.fqdn }}"

          if az containerapp show --name $APP --resource-group $RG &>/dev/null; then
            echo "::notice::Mise à jour de $APP..."
            az containerapp update \
              --name $APP \
              --resource-group $RG \
              --image $IMAGE
          else
            echo "::notice::Premier déploiement de $APP..."
            az containerapp create \
              --name $APP \
              --resource-group $RG \
              --environment ${{ env.CONTAINERAPP_ENV }} \
              --image $IMAGE \
              --registry-server ${{ env.ACR_LOGIN_SERVER }} \
              --registry-username ${{ secrets.ACR_USERNAME }} \
              --registry-password ${{ secrets.ACR_PASSWORD }} \
              --target-port 3000 \
              --ingress external \
              --min-replicas 0 \
              --max-replicas 1 \
              --cpu 0.25 \
              --memory 0.5Gi \
              --env-vars \
                NODE_ENV=production \
                INTERNAL_API_URL=$BACKEND_URL
          fi

      # ── CORS : mettre à jour le backend avec l'URL réelle du frontend ─────
      - name: Mettre à jour CORS backend
        run: |
          FRONTEND_FQDN=$(az containerapp show \
            --name potager-frontend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv)
          az containerapp update \
            --name potager-backend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars "CORS_ORIGINS=https://$FRONTEND_FQDN"

      # ── Résumé affiché dans l'onglet Summary de GitHub Actions ────────────
      - name: Résumé du déploiement
        if: always()
        run: |
          BACKEND_URL="https://${{ steps.backend.outputs.fqdn }}"
          FRONTEND_FQDN=$(az containerapp show \
            --name potager-frontend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv 2>/dev/null || echo "inconnu")
          echo "### Déploiement — Potager EHPAD" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | https://$FRONTEND_FQDN |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | $BACKEND_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Health | $BACKEND_URL/health |" >> $GITHUB_STEP_SUMMARY
          echo "| API Docs | $BACKEND_URL/docs |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit : \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
